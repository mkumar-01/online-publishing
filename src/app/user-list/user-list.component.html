<input type="text" name="search" (input)="search($event)" />
<table class="table table-bordered" width="100%">
      <thead>
        <tr>
            <th>User ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>
        </thead>
        <tbody>
            @for (item of userlist; track $index) {
               <tr>
                    <td>{{item.id}}</td>
                    <td>{{item.firstName}}</td>
                    <td>{{item.lastName}}</td>
                    <td>{{item.email}}</td>
                    <td>{{item.phone}}</td>
               </tr> 
            }
        </tbody>
  
</table>
